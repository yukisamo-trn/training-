<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRAINING">
<meta name="theme-color" content="#0a0a0a">
<title>TRAINING</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#888;--text3:#4a4a4a;
  --accent:#e8ff47;--accent2:#b8cc30;
  --blue:#4a9eff;--red:#ff5c5c;--green:#4ade80;--orange:#fb923c;--purple:#c084fc;
  --r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden}

.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.15s}
.nb.active{color:var(--accent)}
.nb svg{width:20px;height:20px;stroke-width:1.5}

.page{display:none;padding:0 0 90px;min-height:100vh}
.page.active{display:block}

.hdr{padding:52px 18px 16px}
.hdr-date{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-top:3px}
.hdr-sub{font-size:12px;color:var(--text3);margin-top:3px}

.sec{padding:0 18px 18px}
.sec-label{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}

.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.m-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.m-val{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.m-unit{font-size:11px;color:var(--text2);margin-left:2px}
.m-goal{font-size:11px;color:var(--text3);margin-top:2px}
.m-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:7px;overflow:hidden}
.m-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

.cal-wrap{display:flex;align-items:center;gap:16px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.cal-info{flex:1}
.cal-num{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
.cal-lbl{font-size:11px;color:var(--text3)}
.cal-rem{font-size:13px;color:var(--text2);margin-top:3px}

.li{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:7px}
.li-name{font-size:13px;font-weight:500}
.li-sub{font-size:11px;color:var(--text3);margin-top:2px}
.li-right{display:flex;align-items:center;gap:8px}
.li-val{font-size:15px;font-weight:600;color:var(--accent)}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;padding:2px 5px;line-height:1}

/* 不足アラート */
.alert-card{border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.alert-ok{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2)}
.alert-warn{background:rgba(232,255,71,0.07);border:1px solid rgba(232,255,71,0.2)}
.alert-bad{background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2)}
.alert-icon{font-size:18px;flex-shrink:0}
.alert-text{font-size:12px;line-height:1.5}
.alert-title{font-weight:600;font-size:13px;margin-bottom:2px}

.af{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:14px}
.af h3{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.f-full{grid-column:1/-1}
.f-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:5px;margin-top:9px}
input[type=text],input[type=number],input[type=date],select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
input[type=date]{color-scheme:dark}
.btn{display:block;width:100%;padding:11px;border-radius:var(--r2);border:none;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:0.02em;transition:all 0.15s;font-family:inherit}
.btn-p{background:var(--accent);color:#0a0a0a}
.btn-p:active{transform:scale(0.97);background:var(--accent2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2);margin-top:7px}
.btn-g:active{background:var(--bg3)}
.btn-sm{padding:7px 13px;font-size:12px;width:auto}
.btn-red{background:rgba(255,92,92,0.15);color:var(--red);border:1px solid rgba(255,92,92,0.3);margin-top:7px}

.tabs{display:flex;gap:5px;margin-bottom:14px}
.tab{flex:1;padding:8px;text-align:center;font-size:11px;border-radius:var(--r2);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.15s}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.set-row{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.set-lbl{font-size:11px;color:var(--text3);width:38px;flex-shrink:0}
.set-vals{flex:1;font-size:12px}
.set-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px 5px}

.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.badge-p{background:rgba(232,255,71,0.12);color:var(--accent)}
.badge-r{background:rgba(255,92,92,0.12);color:var(--red)}
.badge-g{background:rgba(74,222,128,0.12);color:var(--green)}
.badge-b{background:rgba(74,158,255,0.12);color:var(--blue)}

.rest-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.chart-wrap{position:relative;height:200px;margin-bottom:14px}

/* 目標カード */
.goal-hero{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.goal-name{font-size:12px;color:var(--text3);margin-bottom:4px}
.goal-vals{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.goal-cur{font-size:24px;font-weight:800;letter-spacing:-0.02em}
.goal-tgt{font-size:13px;color:var(--text2)}
.goal-bar-wrap{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.goal-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.goal-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.goal-pct{color:var(--accent);font-weight:600}

/* 記録ページ */
.body-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.stat-unit{font-size:11px;color:var(--text2);margin-left:2px}
.stat-change{font-size:11px;margin-top:3px}
.stat-up{color:var(--red)}
.stat-down{color:var(--green)}

.rm-val{font-size:11px;color:var(--purple);background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.2);padding:2px 7px;border-radius:4px}

.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.chip:active{background:var(--bg4)}

.chart-tabs{display:flex;gap:5px;margin-bottom:10px}
.ctab{padding:5px 12px;font-size:11px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:inherit}
.ctab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.divider{height:1px;background:var(--border);margin:0 18px 18px}
.empty{text-align:center;padding:36px 18px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:7px}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent);color:#0a0a0a;padding:9px 18px;border-radius:100px;font-size:12px;font-weight:700;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 設定ページ */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:7px;cursor:pointer}
.setting-label{font-size:13px;font-weight:500}
.setting-val{font-size:13px;color:var(--text3)}

/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px 18px max(24px,env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;margin-top:-2px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">
  <div class="hdr">
    <div class="hdr-date" id="today-date"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div class="hdr-title">今日</div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">STREAK</div><div style="font-size:18px;font-weight:700;color:var(--accent)" id="streak-disp">0日</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="cal-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" style="flex-shrink:0">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#1e1e1e" stroke-width="7"/>
        <circle cx="36" cy="36" r="30" fill="none" stroke="#e8ff47" stroke-width="7"
          stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke-linecap="round"
          transform="rotate(-90 36 36)" id="cal-ring" style="transition:stroke-dashoffset 0.5s ease"/>
      </svg>
      <div class="cal-info">
        <div class="cal-num"><span id="home-cal">0</span><span style="font-size:14px;font-weight:400;color:var(--text2)"> kcal</span></div>
        <div class="cal-lbl">本日の摂取</div>
        <div class="cal-rem" id="home-remain">—</div>
      </div>
    </div>
    <div class="m-grid">
      <div class="m-card"><div class="m-label">タンパク質</div><div class="m-val"><span id="h-p">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-pg">150</span>g</div><div class="m-bar"><div class="m-fill" id="bar-p" style="width:0%;background:var(--blue)"></div></div></div>
      <div class="m-card"><div class="m-label">脂質</div><div class="m-val"><span id="h-f">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-fg">60</span>g</div><div class="m-bar"><div class="m-fill" id="bar-f" style="width:0%;background:var(--orange)"></div></div></div>
      <div class="m-card"><div class="m-label">炭水化物</div><div class="m-val"><span id="h-c">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-cg">250</span>g</div><div class="m-bar"><div class="m-fill" id="bar-c" style="width:0%;background:var(--green)"></div></div></div>
      <div class="m-card"><div class="m-label">カロリー残</div><div class="m-val" id="h-cal-rem-val" style="font-size:16px">—</div><div class="m-goal">目標 <span id="h-calg">2200</span>kcal</div><div class="m-bar"><div class="m-fill" id="bar-cal" style="width:0%;background:var(--accent)"></div></div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="sec">
    <div class="sec-label">今日のトレーニング</div>
    <div id="home-workout-sum"></div>
  </div>
</div>

<!-- ===== FOOD ===== -->
<div class="page" id="page-food">
  <div class="hdr">
    <div class="hdr-date" id="food-date"></div>
    <div class="hdr-title">食事記録</div>
  </div>
  <div class="sec">
    <div class="tabs">
      <button class="tab active" onclick="foodTab('add')" id="ftab-add">追加</button>
      <button class="tab" onclick="foodTab('log')" id="ftab-log">記録</button>
      <button class="tab" onclick="foodTab('check')" id="ftab-check">不足チェック</button>
    </div>

    <!-- 追加パネル -->
    <div id="fpanel-add">
      <div class="af">
        <h3>食事を追加</h3>
        <label class="f-label">日付</label>
        <input type="date" id="food-add-date">
        <label class="f-label">食品名</label>
        <input type="text" id="fn" placeholder="例: 鶏むね肉 100g">
        <div class="f-grid" style="margin-top:8px">
          <div><label class="f-label">カロリー (kcal)</label><input type="number" id="fc" placeholder="0"></div>
          <div><label class="f-label">タンパク質 (g)</label><input type="number" id="fp" placeholder="0"></div>
          <div><label class="f-label">脂質 (g)</label><input type="number" id="ff" placeholder="0"></div>
          <div><label class="f-label">炭水化物 (g)</label><input type="number" id="fcc" placeholder="0"></div>
        </div>
        <div style="margin-top:12px"><button class="btn btn-p" onclick="addFood()">追加する</button></div>
      </div>
    </div>

    <!-- 記録パネル -->
    <div id="fpanel-log" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button onclick="foodLogPrev()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">‹</button>
        <input type="date" id="food-log-date" onchange="renderFoodLog()" style="flex:1;text-align:center">
        <button onclick="foodLogNext()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">›</button>
      </div>
      <div id="food-log-list"></div>
    </div>

    <!-- 不足チェックパネル -->
    <div id="fpanel-check" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button onclick="checkPrev()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">‹</button>
        <input type="date" id="check-date" onchange="renderNutritionCheck()" style="flex:1;text-align:center">
        <button onclick="checkNext()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">›</button>
      </div>
      <div id="nutrition-check"></div>
    </div>
  </div>
</div>

<!-- ===== WORKOUT ===== -->
<div class="page" id="page-workout">
  <div class="hdr">
    <div class="hdr-date" id="wo-date"></div>
    <div class="hdr-title">筋トレ記録</div>
  </div>
  <div class="sec">
    <div class="tabs">
      <button class="tab active" onclick="woTab('add')" id="wtab-add">追加</button>
      <button class="tab" onclick="woTab('log')" id="wtab-log">今日</button>
      <button class="tab" onclick="woTab('hist')" id="wtab-hist">履歴</button>
    </div>

    <div id="wpanel-add">
      <div class="af">
        <h3>種目を追加</h3>
        <label class="f-label">日付</label>
        <input type="date" id="wo-add-date">
        <label class="f-label">種目名</label>
        <input type="text" id="ex-name" placeholder="例: ベンチプレス" oninput="showLastRecord(this.value)">
        <div id="last-record-box" style="display:none;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:10px 12px;margin-top:6px;font-size:12px"></div>
        <label class="f-label">部位</label>
        <select id="ex-part">
          <option value="胸">胸</option><option value="背中">背中</option>
          <option value="肩">肩</option><option value="腕">腕</option>
          <option value="脚">脚</option><option value="体幹">体幹</option>
        </select>
        <label class="f-label">セット (kg / 回)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="set-w" placeholder="kg" style="flex:1">
          <input type="number" id="set-r" placeholder="回" style="flex:1">
          <button class="btn btn-g btn-sm" onclick="addSet()" style="flex-shrink:0">+追加</button>
        </div>
        <div id="sets-list" style="margin-top:8px"></div>
        <label class="f-label">メモ (任意)</label>
        <input type="text" id="ex-comment" placeholder="フォーム・感覚など">
        <div style="margin-top:12px"><button class="btn btn-p" onclick="addExercise()">記録する</button></div>
      </div>
      <div class="sec-label">よく使う種目</div>
      <div class="tag-row">
        <button class="chip" onclick="quickEx('ベンチプレス','胸')">ベンチプレス</button>
        <button class="chip" onclick="quickEx('インクラインDB','胸')">インクラインDB</button>
        <button class="chip" onclick="quickEx('スクワット','脚')">スクワット</button>
        <button class="chip" onclick="quickEx('デッドリフト','背中')">デッドリフト</button>
        <button class="chip" onclick="quickEx('ラットプルダウン','背中')">ラットプルダウン</button>
        <button class="chip" onclick="quickEx('ショルダープレス','肩')">ショルダープレス</button>
        <button class="chip" onclick="quickEx('サイドレイズ','肩')">サイドレイズ</button>
        <button class="chip" onclick="quickEx('ダンベルカール','腕')">DBカール</button>
        <button class="chip" onclick="quickEx('トライセプスPD','腕')">トライセプス</button>
        <button class="chip" onclick="quickEx('レッグプレス','脚')">レッグプレス</button>
        <button class="chip" onclick="quickEx('プランク','体幹')">プランク</button>
      </div>
    </div>

    <div id="wpanel-log" style="display:none">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button onclick="woLogPrev()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">‹</button>
        <input type="date" id="wo-log-date" onchange="renderWoLog()" style="flex:1;text-align:center">
        <button onclick="woLogNext()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:6px 12px;cursor:pointer;font-size:15px;font-family:inherit">›</button>
      </div>
      <div id="wo-log-list"></div>
    </div>

    <div id="wpanel-hist" style="display:none">
      <div class="sec-label">種目を選択</div>
      <select id="hist-ex-sel" onchange="renderHistChart()" style="margin-bottom:14px">
        <option value="">-- 種目を選択 --</option>
      </select>
      <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
      <div id="hist-detail"></div>
    </div>
  </div>
</div>

<!-- ===== 記録 ===== -->
<div class="page" id="page-record">
  <div class="hdr">
    <div class="hdr-title">体組成記録</div>
    <div class="hdr-sub">InBodyの数値を入力</div>
  </div>
  <div class="sec">
    <!-- 現在値 -->
    <div class="body-stats" id="body-stats-display"></div>

    <!-- グラフ -->
    <div class="chart-tabs" id="chart-tabs">
      <button class="ctab active" onclick="switchBodyChart('weight',this)">体重</button>
      <button class="ctab" onclick="switchBodyChart('fat',this)">体脂肪%</button>
      <button class="ctab" onclick="switchBodyChart('muscle',this)">骨格筋量</button>
      <button class="ctab" onclick="switchBodyChart('bmi',this)">BMI</button>
    </div>
    <div class="chart-wrap"><canvas id="body-chart"></canvas></div>

    <!-- 入力フォーム -->
    <div class="sec-label">新しい記録を追加</div>
    <div class="af">
      <div class="f-grid">
        <div class="f-full"><label class="f-label">日付</label><input type="date" id="rec-date"></div>
        <div><label class="f-label">体重 (kg)</label><input type="number" id="rec-w" step="0.1" placeholder="70.5"></div>
        <div><label class="f-label">体脂肪率 (%)</label><input type="number" id="rec-fat" step="0.1" placeholder="16.5"></div>
        <div><label class="f-label">骨格筋量 (kg)</label><input type="number" id="rec-muscle" step="0.1" placeholder="30.0"></div>
        <div><label class="f-label">身長 (cm)</label><input type="number" id="rec-height" step="0.1" placeholder="170"></div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-p" onclick="addBodyRecord()">記録する</button></div>
    </div>

    <!-- 記録一覧 -->
    <div class="sec-label">記録一覧</div>
    <div id="body-record-list"></div>
  </div>
</div>

<!-- ===== 目標 ===== -->
<div class="page" id="page-goal">
  <div class="hdr">
    <div class="hdr-title">目標管理</div>
  </div>
  <div class="sec">
    <div id="goal-cards"></div>

    <div class="sec-label" style="margin-top:8px">目標を設定・変更</div>
    <div class="af">
      <h3>体組成目標</h3>
      <div class="f-grid">
        <div><label class="f-label">目標体重 (kg)</label><input type="number" id="gt-w" step="0.1" placeholder="67"></div>
        <div><label class="f-label">目標体脂肪 (%)</label><input type="number" id="gt-fat" step="0.1" placeholder="12"></div>
        <div><label class="f-label">目標骨格筋量 (kg)</label><input type="number" id="gt-muscle" step="0.1" placeholder="33"></div>
        <div class="f-full"><label class="f-label">達成期限</label><input type="date" id="gt-deadline"></div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-p" onclick="saveGoalTargets()">保存する</button></div>
    </div>

    <div class="af" style="border-color:var(--border)">
      <h3>栄養目標 (1日)</h3>
      <div class="f-grid">
        <div><label class="f-label">カロリー (kcal)</label><input type="number" id="gnc" placeholder="2200"></div>
        <div><label class="f-label">タンパク質 (g)</label><input type="number" id="gnp" placeholder="150"></div>
        <div><label class="f-label">脂質 (g)</label><input type="number" id="gnf" placeholder="60"></div>
        <div><label class="f-label">炭水化物 (g)</label><input type="number" id="gncc" placeholder="250"></div>
      </div>
      <div style="margin-top:4px;font-size:11px;color:var(--text3)">体重×2〜2.5gがタンパク質の目安</div>
      <div style="margin-top:12px"><button class="btn btn-p" onclick="saveNutrGoals()">保存する</button></div>
    </div>
  </div>
</div>


<!-- ===== カレンダー ===== -->
<div class="page" id="page-cal">
  <div class="hdr">
    <div class="hdr-title">カレンダー</div>
    <div class="hdr-sub">トレーニング・栄養の達成記録</div>
  </div>
  <div class="sec">
    <!-- 月ナビ -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="calPrev()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:7px 14px;cursor:pointer;font-size:16px;font-family:inherit">‹</button>
      <div id="cal-month-label" style="font-size:16px;font-weight:700;letter-spacing:-0.01em"></div>
      <button onclick="calNext()" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:7px 14px;cursor:pointer;font-size:16px;font-family:inherit">›</button>

    <!-- 凡例 -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:10px;color:var(--text3)">

    <!-- 曜日ヘッダー -->

      <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0">水</div>
      <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0">木</div>
      <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0">金</div>
      <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;color:var(--blue)">土</div>
    </div>

    <!-- カレンダーグリッド -->
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:20px"></div>

    <!-- 月間サマリー -->
    <div id="cal-month-summary"></div>

    <!-- 日付詳細 -->
    <div id="cal-day-detail"></div>
  </div>
</div>

    目標

<script>
// ===== STATE =====
function getToday(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
let TODAY = getToday();

// 日付変更を定期チェック（1分ごと）
setInterval(()=>{
  const newDay = getToday();
  if(newDay !== TODAY){
    TODAY = newDay;
    // streak更新
    const yest = new Date(Date.now()-86400000).toISOString().split('T')[0];
    S.streak = S.lastActive === yest ? S.streak+1 : 1;
    S.lastActive = TODAY;
    save();
    renderHome();
    document.querySelectorAll('#today-date,#food-date,#wo-date').forEach(el=>{ if(el) el.textContent=fmtDate(new Date()); });
  }
}, 60000);

let S = JSON.parse(localStorage.getItem('tr-v3') || 'null') || {
  goals: { cal:2200, p:150, f:60, c:250 },
  targets: { weight:67, fat:12, muscle:33, bench:80, deadline:'' },
  bodyHistory: [],
  foods: {}, workouts: {},
  streak: 0, lastActive: null,
  height: 170
};

// データ移行
['tr-v2','training-state'].forEach(key => {
  const old = localStorage.getItem(key);
  if (old && !localStorage.getItem('migrated-'+key)) {
    try {
      const d = JSON.parse(old);
      if (d.foods) Object.assign(S.foods, d.foods);
      if (d.workouts) Object.assign(S.workouts, d.workouts);
      if (d.goals) S.goals = {...S.goals, ...d.goals};
      if (d.bodyHistory) S.bodyHistory = [...S.bodyHistory, ...d.bodyHistory];
      localStorage.setItem('migrated-'+key, '1');
      save();
    } catch(e){}
  }
});

function save() { localStorage.setItem('tr-v3', JSON.stringify(S)); }

// Streak
if (S.lastActive !== getToday()) {
  const yest = new Date(Date.now()-86400000).toISOString().split('T')[0];
  S.streak = S.lastActive === yest ? S.streak+1 : 1;
  S.lastActive = getToday();
  save();
}

// ===== UTILS =====
const DAYS = ['日','月','火','水','木','金','土'];
function fmtDate(d){ return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`; }
function epley(w,r){ return r===1 ? w : Math.round(w*(1+r/30)); }
function getDateStr(offset){ return new Date(Date.now()+offset*86400000).toISOString().split('T')[0]; }
function daysUntil(dateStr){ if(!dateStr) return null; const d=new Date(dateStr)-new Date(TODAY); return Math.ceil(d/86400000); }

document.querySelectorAll('#today-date,#food-date,#wo-date').forEach(el=>{ if(el) el.textContent=fmtDate(new Date()); });
document.getElementById('rec-date').value = getToday();

const PARTS = ['胸','背中','肩','腕','脚','体幹'];
const REST_HOURS = { 胸:48, 背中:48, 肩:48, 腕:36, 脚:72, 体幹:24 };

// ===== NAVIGATION =====
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='home') renderHome();
  if(id==='food'){
    document.getElementById('food-add-date').value=getToday();
    document.getElementById('food-log-date').value=getToday();
    document.getElementById('check-date').value=getToday();
    foodTab('add');
  }
  if(id==='workout'){
    document.getElementById('wo-add-date').value=getToday();
    document.getElementById('wo-log-date').value=getToday();
    woTab('add'); renderHistSel();
  }
  if(id==='record'){ renderBodyStats(); renderBodyChart('weight'); renderBodyList(); }
  if(id==='goal'){ renderGoalPage(); }
  if(id==='cal'){ renderCalendar(); }
}

// ===== HOME =====
function renderHome() {
  const foods = S.foods[getToday()]||[];
  const cal = foods.reduce((a,f)=>a+f.cal,0);
  const p = foods.reduce((a,f)=>a+f.p,0);
  const f = foods.reduce((a,f)=>a+f.f,0);
  const c = foods.reduce((a,f)=>a+f.c,0);

  document.getElementById('home-cal').textContent = Math.round(cal);
  document.getElementById('h-p').textContent = Math.round(p);
  document.getElementById('h-f').textContent = Math.round(f);
  document.getElementById('h-c').textContent = Math.round(c);
  document.getElementById('h-pg').textContent = S.goals.p;
  document.getElementById('h-fg').textContent = S.goals.f;
  document.getElementById('h-cg').textContent = S.goals.c;
  document.getElementById('h-calg').textContent = S.goals.cal;
  document.getElementById('streak-disp').textContent = S.streak+'日';

  const rem = S.goals.cal - cal;
  document.getElementById('home-remain').textContent = rem>=0
    ? `残り ${Math.round(rem)} kcal` : `${Math.round(-rem)} kcal オーバー`;
  document.getElementById('h-cal-rem-val').textContent = rem>=0 ? Math.round(rem)+'kcal' : 'OVER';
  document.getElementById('h-cal-rem-val').style.color = rem>=0 ? 'var(--accent)' : 'var(--red)';

  const pct = Math.min(cal/S.goals.cal,1);
  document.getElementById('cal-ring').style.strokeDashoffset = 188.5*(1-pct);
  document.getElementById('bar-p').style.width = Math.min(p/S.goals.p*100,100)+'%';
  document.getElementById('bar-f').style.width = Math.min(f/S.goals.f*100,100)+'%';
  document.getElementById('bar-c').style.width = Math.min(c/S.goals.c*100,100)+'%';
  document.getElementById('bar-cal').style.width = Math.min(pct*100,100)+'%';

  // Workout summary
  const ws = S.workouts[getToday()]||[];
  const wsEl = document.getElementById('home-workout-sum');
  wsEl.innerHTML = ws.length===0
    ? '<div class="empty"><div class="empty-icon">💪</div>まだ記録なし</div>'
    : ws.map(w=>{
        const maxW = w.sets.length>0 ? Math.max(...w.sets.map(s=>s.w)) : null;
        return `<div class="li"><div><div class="li-name">${w.name}</div><div class="li-sub">${w.part} · ${w.sets.length}セット</div></div><span class="badge badge-p">${maxW?maxW+'kg':'—'}</span></div>`;
      }).join('');

}

// ===== FOOD =====
function foodTab(t) {
  ['add','log','check'].forEach(x=>{
    document.getElementById('fpanel-'+x).style.display = t===x?'':'none';
    document.getElementById('ftab-'+x).classList.toggle('active', t===x);
  });
  if(t==='log'){
    const el=document.getElementById('food-log-date');
    if(!el.value) el.value=getToday();
    renderFoodLog();
  }
  if(t==='check'){
    const el=document.getElementById('check-date');
    if(!el.value) el.value=getToday();
    renderNutritionCheck();
  }
}

let editingFood = null; // {date, index}

function addFood() {
  const name = document.getElementById('fn').value.trim();
  if(!name){ showToast('食品名を入力'); return; }
  const dateEl = document.getElementById('food-add-date');
  if(!dateEl.value) dateEl.value = getToday();
  const date = dateEl.value;
  const item = {
    name,
    cal: +document.getElementById('fc').value||0,
    p: +document.getElementById('fp').value||0,
    f: +document.getElementById('ff').value||0,
    c: +document.getElementById('fcc').value||0
  };
  if(!S.foods[date]) S.foods[date]=[];
  if(editingFood && editingFood.date===date){
    S.foods[date][editingFood.index] = item;
    editingFood = null;
    document.querySelector('#fpanel-add .btn-p').textContent = '追加する';
  } else {
    S.foods[date].push(item);
  }
  save();
  ['fn','fc','fp','ff','fcc'].forEach(id=>document.getElementById(id).value='');
  renderHome(); showToast(name+' を'+(editingFood?'更新':'追加'));
}

function editFood(i, date) {
  const f = S.foods[date][i];
  editingFood = {date, index:i};
  document.getElementById('food-add-date').value = date;
  document.getElementById('fn').value = f.name;
  document.getElementById('fc').value = f.cal;
  document.getElementById('fp').value = f.p;
  document.getElementById('ff').value = f.f;
  document.getElementById('fcc').value = f.c;
  document.querySelector('#fpanel-add .btn-p').textContent = '更新する';
  foodTab('add');
  window.scrollTo(0,0);
  showToast('編集モード');
}

function renderFoodLog() {
  const dateEl = document.getElementById('food-log-date');
  if(!dateEl.value) dateEl.value = getToday();
  const date = dateEl.value;
  const foods = S.foods[date]||[];
  const el = document.getElementById('food-log-list');
  const isToday = date === TODAY;
  const label = isToday ? '本日の合計' : date+'の合計';
  if(foods.length===0){ el.innerHTML=`<div class="empty"><div class="empty-icon">🍱</div>${isToday?'まだ記録がありません':'この日の記録なし'}</div>`; return; }
  const total = { cal:0, p:0, f:0, c:0 };
  foods.forEach(f=>{ total.cal+=f.cal; total.p+=f.p; total.f+=f.f; total.c+=f.c; });
  el.innerHTML = `<div class="card" style="margin-bottom:12px">
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${label}</div>
    <div style="display:flex;justify-content:space-between">
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--accent)">${Math.round(total.cal)}</div><div style="font-size:10px;color:var(--text3)">kcal</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--blue)">${Math.round(total.p)}</div><div style="font-size:10px;color:var(--text3)">タンパク質g</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--orange)">${Math.round(total.f)}</div><div style="font-size:10px;color:var(--text3)">脂質g</div></div>
      <div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green)">${Math.round(total.c)}</div><div style="font-size:10px;color:var(--text3)">炭水化物g</div></div>
    </div>
  </div>`
  + foods.map((f,i)=>`<div class="li"><div><div class="li-name">${f.name}</div><div class="li-sub">P${f.p}g F${f.f}g C${f.c}g</div></div><div class="li-right"><div class="li-val">${f.cal}</div><button class="del-btn" style="color:var(--blue);font-size:13px" onclick="editFood(${i},'${date}')">✏️</button><button class="del-btn" onclick="delFood(${i},'${date}')">×</button></div></div>`).join('');
}

function delFood(i,date){
  const d = date||document.getElementById('food-log-date').value||TODAY;
  S.foods[d].splice(i,1); save();
  renderFoodLog(); renderHome();
}

function foodLogPrev(){
  const el=document.getElementById('food-log-date');
  const d=new Date(el.value||TODAY); d.setDate(d.getDate()-1);
  el.value=d.toISOString().split('T')[0]; renderFoodLog();
}
function foodLogNext(){
  const el=document.getElementById('food-log-date');
  const d=new Date(el.value||getToday()); d.setDate(d.getDate()+1);
  if(d.toISOString().split('T')[0]>getToday()) return;
  el.value=d.toISOString().split('T')[0]; renderFoodLog();
}
function checkPrev(){
  const el=document.getElementById('check-date');
  const d=new Date(el.value||TODAY); d.setDate(d.getDate()-1);
  el.value=d.toISOString().split('T')[0]; renderNutritionCheck();
}
function checkNext(){
  const el=document.getElementById('check-date');
  const d=new Date(el.value||getToday()); d.setDate(d.getDate()+1);
  if(d.toISOString().split('T')[0]>getToday()) return;
  el.value=d.toISOString().split('T')[0]; renderNutritionCheck();
}

function renderNutritionCheck() {
  const dateEl = document.getElementById('check-date');
  if(!dateEl.value) dateEl.value = getToday();
  const date = dateEl.value;
  const foods = S.foods[date]||[];
  const cal = foods.reduce((a,f)=>a+f.cal,0);
  const p = foods.reduce((a,f)=>a+f.p,0);
  const f = foods.reduce((a,f)=>a+f.f,0);
  const c = foods.reduce((a,f)=>a+f.c,0);
  const g = S.goals;

  const checks = [
    { label:'カロリー', cur:Math.round(cal), goal:g.cal, unit:'kcal', color:'var(--accent)' },
    { label:'タンパク質', cur:Math.round(p), goal:g.p, unit:'g', color:'var(--blue)' },
    { label:'脂質', cur:Math.round(f), goal:g.f, unit:'g', color:'var(--orange)' },
    { label:'炭水化物', cur:Math.round(c), goal:g.c, unit:'g', color:'var(--green)' },
  ];

  document.getElementById('nutrition-check').innerHTML = `
    <div style="margin-bottom:14px;font-size:12px;color:var(--text2)">今日あと何を食べればいいか確認できます</div>
    ${checks.map(ch=>{
      const pct = Math.min(ch.cur/ch.goal*100,100);
      const rem = ch.goal - ch.cur;
      const ok = rem<=0;
      const cls = ok ? 'alert-ok' : pct<50 ? 'alert-bad' : 'alert-warn';
      const icon = ok ? '✅' : pct<50 ? '❗' : '⚠️';
      return `<div class="alert-card ${cls}">
        <div class="alert-icon">${icon}</div>
        <div class="alert-text" style="flex:1">
          <div class="alert-title" style="color:${ch.color}">${ch.label}</div>
          <div>${ch.cur}${ch.unit} / 目標 ${ch.goal}${ch.unit}</div>
          <div style="margin-top:3px">${ok ? '達成！' : `あと <strong>${Math.round(rem)}${ch.unit}</strong> 必要`}</div>
        </div>
        <div style="text-align:right;font-size:13px;font-weight:700;color:${ch.color}">${Math.round(pct)}%</div>
      </div>`;
    }).join('')}
    <div style="margin-top:14px;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text2);line-height:1.7">
      💡 タンパク質目標 ${g.p}g は体重×${(g.p/(S.bodyHistory.length>0?S.bodyHistory[S.bodyHistory.length-1].weight:70.5)).toFixed(1)}g で設定中。<br>

  const bmi = latest && S.height ? (latest.weight/(S.height/100)**2).toFixed(1) : '—';

    const diffColor = diff ? (parseFloat(diff)<0 ? (isGoodDown?'var(--green)':'var(--red)') : (isGoodDown?'var(--red)':'var(--green)')) : '';

function renderGoalPage(){
  const t = S.targets;
  const latest = S.bodyHistory.length>0 ? S.bodyHistory[S.bodyHistory.length-1] : null;

  // ベスト1RM
  let bestBench = 0;
  Object.values(S.workouts).forEach(ws=>{
    ws.filter(w=>w.name.includes('ベンチ')).forEach(w=>{
      w.sets.forEach(s=>{ const rm=epley(s.w,s.r); if(rm>bestBench) bestBench=rm; });
    });
  });

  const dLeft = daysUntil(t.deadline);
  const deadlineStr = t.deadline ? `${t.deadline} まで あと${dLeft}日` : '期限未設定';

  // 体脂肪達成判定
  const fatAchieved = latest && t.fat && latest.fat !== null && latest.fat <= t.fat;

  function makeGoalCard(g) {
    if (!g.cur || !g.tgt) return '<div class="goal-hero"><div class="goal-name">'+g.label+'</div><div style="font-size:13px;color:var(--text3)">記録または目標を設定してください</div></div>';
    const startVal = g.lowerIsBetter ? Math.max(g.cur, g.tgt) : Math.min(g.cur, g.tgt);
    const range = Math.abs(g.tgt - startVal) || 1;
    const progress = g.lowerIsBetter
      ? Math.max(0, Math.min(100, (startVal - g.cur) / range * 100))
      : Math.max(0, Math.min(100, (g.cur - startVal) / range * 100));
    const gap = g.lowerIsBetter ? (g.cur - g.tgt) : (g.tgt - g.cur);
    const achieved = g.lowerIsBetter ? g.cur <= g.tgt : g.cur >= g.tgt;
    const gapStr = achieved ? '目標達成！🎉' : 'あと ' + Math.abs(gap).toFixed(1) + g.unit;
    const gapColor = achieved ? 'var(--green)' : gap > 3 ? 'var(--red)' : 'var(--orange)';
    return '<div class="goal-hero"><div class="goal-name">'+g.label+'</div><div class="goal-vals"><div class="goal-cur">'+g.cur+'<span style="font-size:13px;color:var(--text2)">'+g.unit+'</span></div><div class="goal-tgt">目標 '+g.tgt+g.unit+'</div></div><div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:'+Math.round(progress)+'%;background:'+g.color+'"></div></div><div class="goal-meta"><span style="color:'+gapColor+';font-weight:600">'+gapStr+'</span><span class="goal-pct">'+Math.round(progress)+'%</span></div></div>';
  }

  // 体重カード: 目標以上 かつ 体脂肪達成で成功
  let weightCardHtml = '';
  if (!latest || !t.weight) {
    weightCardHtml = '<div class="goal-hero"><div class="goal-name">体重</div><div style="font-size:13px;color:var(--text3)">記録または目標を設定してください</div></div>';
  } else {
    const cur = latest.weight, tgt = t.weight;
    const weightOk = cur >= tgt;
    const achieved = weightOk && fatAchieved;
    const progress = Math.max(0, Math.min(100, (cur / tgt) * 100));
    let statusStr, statusColor;
    if (achieved) {
      statusStr = '目標達成！🎉'; statusColor = 'var(--green)';
    } else {
      const parts = [];
      if (!weightOk) parts.push('体重あと ' + (tgt - cur).toFixed(1) + 'kg');
      if (!fatAchieved && t.fat && latest.fat) parts.push('体脂肪あと ' + (latest.fat - t.fat).toFixed(1) + '%');
      statusStr = parts.join(' かつ ');
      statusColor = 'var(--red)';
    }
    weightCardHtml = '<div class="goal-hero"><div class="goal-name">体重 <span style="font-size:10px;color:var(--text3)">(目標以上 + 体脂肪達成で✓)</span></div><div class="goal-vals"><div class="goal-cur">'+cur+'<span style="font-size:13px;color:var(--text2)">kg</span></div><div class="goal-tgt">目標 '+tgt+'kg</div></div><div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:'+Math.round(progress)+'%;background:var(--accent)"></div></div><div class="goal-meta"><span style="color:'+statusColor+';font-weight:600">'+statusStr+'</span><span class="goal-pct">'+Math.round(progress)+'%</span></div></div>';
  }

  document.getElementById('goal-cards').innerHTML =
    '<div style="margin-bottom:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--text2)">🎯 ' + deadlineStr + '</div>'
    + weightCardHtml
    + makeGoalCard({ label:'体脂肪率', cur:latest?latest.fat:null, tgt:t.fat, unit:'%', lowerIsBetter:true, color:'var(--red)' })
    + makeGoalCard({ label:'骨格筋量', cur:latest?latest.muscle:null, tgt:t.muscle, unit:'kg', lowerIsBetter:false, color:'var(--blue)' });

  // フォームに現在値を入れる
  if(t.weight) document.getElementById('gt-w').value=t.weight;
  if(t.fat) document.getElementById('gt-fat').value=t.fat;
  if(t.muscle) document.getElementById('gt-muscle').value=t.muscle;
  if(t.deadline) document.getElementById('gt-deadline').value=t.deadline;
  document.getElementById('gnc').value=S.goals.cal;
  document.getElementById('gnp').value=S.goals.p;
  document.getElementById('gnf').value=S.goals.f;
  document.getElementById('gncc').value=S.goals.c;
}

// ===== CALENDAR =====
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function getDayStatus(dateStr){
  const foods = S.foods[dateStr]||[];
  const ws = S.workouts[dateStr]||[];
  const cal = foods.reduce((a,f)=>a+f.cal,0);
  const p = foods.reduce((a,f)=>a+f.p,0);
  const hasWorkout = ws.length > 0;
  const calOk = cal >= S.goals.cal * 0.8;
  const pOk = p >= S.goals.p * 0.8;
  const nutritionOk = foods.length > 0 && calOk && pOk;
  const f = foods.reduce((a,f)=>a+f.f,0);
  const c = foods.reduce((a,f)=>a+f.c,0);
  return { hasWorkout, nutritionOk, hasFoodLog: foods.length > 0, cal:Math.round(cal), p:Math.round(p), f:Math.round(f), c:Math.round(c), woCount:ws.length };
}

function renderCalendar(){
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-month-label').textContent = calYear+'年 '+monthNames[calMonth];

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = TODAY;

  let html = '';
  // 空白セル
  for(let i=0;i<firstDay;i++) html += '<div></div>';

  // 月間集計
  let totalWo=0, totalNutr=0, totalDays=0;

  for(let d=1;d<=daysInMonth;d++){
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const st = getDayStatus(dateStr);
    const isToday = dateStr === todayStr;
    const isFuture = dateStr > todayStr;

    if(!isFuture && (st.hasWorkout || st.hasFoodLog)) totalDays++;
    if(!isFuture && st.hasWorkout) totalWo++;
    if(!isFuture && st.nutritionOk) totalNutr++;

    let icon = '', bg = 'var(--bg2)', border = 'var(--border)';
    if(!isFuture){
      if(st.hasWorkout && st.nutritionOk){ icon='✅'; bg='rgba(74,222,128,0.08)'; border='rgba(74,222,128,0.3)'; }
      else if(st.hasWorkout){ icon='💪'; bg='rgba(232,255,71,0.06)'; border='rgba(232,255,71,0.2)'; }
      else if(st.nutritionOk){ icon='🥗'; bg='rgba(74,158,255,0.06)'; border='rgba(74,158,255,0.2)'; }
    }
    const todayStyle = isToday ? 'border-color:var(--accent);' : '';
    const dayColor = isToday ? 'var(--accent)' : isFuture ? 'var(--text3)' : 'var(--text)';

    html += `<div onclick="showDayDetail('${dateStr}')" style="background:${bg};border:1px solid ${border};${todayStyle}border-radius:6px;padding:5px 3px;text-align:center;cursor:pointer;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:space-between">
      <div style="font-size:11px;color:${dayColor};font-weight:${isToday?'700':'400'}">${d}</div>
      <div style="font-size:14px;line-height:1">${icon}</div>
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;

  // 月間サマリー
  const daysInPast = Math.min(daysInMonth, new Date().getDate() + (calMonth < new Date().getMonth() || calYear < new Date().getFullYear() ? daysInMonth : 0));
  document.getElementById('cal-month-summary').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--accent)">${totalWo}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">トレーニング</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--blue)">${totalNutr}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">栄養達成</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--green)">${totalDays>0?Math.round(totalWo/Math.max(totalDays,1)*100):0}%</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">継続率</div>
      </div>
    </div>`;
  document.getElementById('cal-day-detail').innerHTML = '';
}

function showDayDetail(dateStr){
  const st = getDayStatus(dateStr);
  const ws = S.workouts[dateStr]||[];
  const foods = S.foods[dateStr]||[];
  const isFuture = dateStr > TODAY;
  if(isFuture){ return; }

  const d = new Date(dateStr);
  const label = `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`;

  let html = `<div style="background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px">
    <div style="font-weight:700;font-size:14px;margin-bottom:12px">${label} の記録</div>`;

  if(ws.length>0){
    html += `<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px">💪 トレーニング</div>`;
    html += ws.map(w=>{
      const best = w.sets.length>0 ? Math.max(...w.sets.map(s=>epley(s.w,s.r))) : 0;
      return `<div style="padding:7px 10px;background:var(--bg3);border-radius:6px;margin-bottom:5px;font-size:12px">
        <span style="font-weight:600">${w.name}</span>
        <span style="color:var(--text3);margin-left:6px">${w.part} · ${w.sets.length}セット</span>
        ${best?`<span style="color:var(--purple);margin-left:6px">1RM≈${best}kg</span>`:''}
      </div>`;
    }).join('');
  } else {
    html += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px">💪 トレーニング記録なし</div>`;
  }

  html += `<div style="margin-top:10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px">🥗 栄養</div>`;
  if(foods.length>0){
    const pPct = Math.round(st.p/S.goals.p*100);
    const calPct = Math.round(st.cal/S.goals.cal*100);
    const fPct = Math.round(st.f/S.goals.f*100);
    const cPct = Math.round(st.c/S.goals.c*100);
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
      <div style="background:var(--bg3);border-radius:6px;padding:8px;text-align:center">
        <div style="font-weight:700;color:var(--accent)">${st.cal}kcal</div>
        <div style="color:var(--text3);font-size:10px">カロリー ${calPct}%</div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:8px;text-align:center">
        <div style="font-weight:700;color:var(--blue)">${st.p}g</div>
        <div style="color:var(--text3);font-size:10px">タンパク質 ${pPct}%</div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:8px;text-align:center">
        <div style="font-weight:700;color:var(--orange)">${st.f}g</div>
        <div style="color:var(--text3);font-size:10px">脂質 ${fPct}%</div>
      </div>
      <div style="background:var(--bg3);border-radius:6px;padding:8px;text-align:center">
        <div style="font-weight:700;color:var(--green)">${st.c}g</div>
        <div style="color:var(--text3);font-size:10px">炭水化物 ${cPct}%</div>
      </div>
    </div>
    <div style="margin-top:8px;font-size:11px;color:var(--text3)">${foods.length}品目記録</div>`;
  } else {
    html += `<div style="font-size:12px;color:var(--text3)">食事記録なし</div>`;
  }

  html += '</div>';
  document.getElementById('cal-day-detail').innerHTML = html;
  document.getElementById('cal-day-detail').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ===== INIT =====
renderHome();
</script>
</body>
</html>
