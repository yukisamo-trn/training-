<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TRAINING">
<meta name="theme-color" content="#0a0a0a">
<title>TRAINING</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --bg4:#252525;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --text:#f0f0f0; --text2:#888; --text3:#4a4a4a;
  --accent:#e8ff47; --accent2:#b8cc30;
  --blue:#4a9eff; --red:#ff5c5c; --green:#4ade80; --orange:#fb923c; --purple:#c084fc;
  --r:12px; --r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.15s}
.nb.active{color:var(--accent)}
.nb svg{width:20px;height:20px;stroke-width:1.5}

/* PAGES */
.page{display:none;padding:0 0 90px;min-height:100vh}
.page.active{display:block}

/* HEADER */
.hdr{padding:52px 18px 16px}
.hdr-date{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.hdr-title{font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-top:3px}

/* SECTION */
.sec{padding:0 18px 18px}
.sec-label{font-size:10px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}

/* MACRO */
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.m-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.m-val{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.m-unit{font-size:11px;color:var(--text2);margin-left:2px}
.m-goal{font-size:11px;color:var(--text3);margin-top:2px}
.m-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:7px;overflow:hidden}
.m-fill{height:100%;border-radius:2px;transition:width 0.4s ease}

/* CAL RING */
.cal-wrap{display:flex;align-items:center;gap:16px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.cal-info{flex:1}
.cal-num{font-size:28px;font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
.cal-lbl{font-size:11px;color:var(--text3)}
.cal-rem{font-size:13px;color:var(--text2);margin-top:3px}

/* LIST ITEM */
.li{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:7px}
.li-name{font-size:13px;font-weight:500}
.li-sub{font-size:11px;color:var(--text3);margin-top:2px}
.li-right{display:flex;align-items:center;gap:8px}
.li-val{font-size:15px;font-weight:600;color:var(--accent)}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:17px;padding:2px 5px;line-height:1}

/* FORM */
.af{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:14px;margin-bottom:14px}
.af h3{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.f-full{grid-column:1/-1}
.f-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;display:block;margin-bottom:5px;margin-top:9px}
input[type=text],input[type=number],select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;padding:9px 11px;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{resize:none;height:60px;line-height:1.5}
.btn{display:block;width:100%;padding:11px;border-radius:var(--r2);border:none;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:0.02em;transition:all 0.15s;font-family:inherit}
.btn-p{background:var(--accent);color:#0a0a0a}
.btn-p:active{transform:scale(0.97);background:var(--accent2)}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2);margin-top:7px}
.btn-g:active{background:var(--bg3)}
.btn-sm{padding:7px 13px;font-size:12px;width:auto}

/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:14px}
.tab{flex:1;padding:8px;text-align:center;font-size:11px;border-radius:var(--r2);border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.15s}
.tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* SET */
.set-row{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.set-lbl{font-size:11px;color:var(--text3);width:38px;flex-shrink:0}
.set-vals{flex:1;font-size:12px}
.set-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px 5px}

/* BADGE */
.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.badge-p{background:rgba(232,255,71,0.12);color:var(--accent)}
.badge-r{background:rgba(255,92,92,0.12);color:var(--red)}
.badge-g{background:rgba(74,222,128,0.12);color:var(--green)}
.badge-b{background:rgba(74,158,255,0.12);color:var(--blue)}

/* REST INDICATOR */
.rest-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MUSCLE MAP */
.mu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:14px}
.mu-chip{background:var(--bg3);border-radius:6px;padding:8px 5px;text-align:center;font-size:10px;color:var(--text2);border:1px solid transparent;transition:all 0.15s}
.mu-chip.rested{border-color:var(--red);color:var(--red);background:rgba(255,92,92,0.08)}
.mu-chip.today{border-color:var(--green);color:var(--green);background:rgba(74,222,128,0.08)}

/* ADVICE */
.adv-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.adv-icon{font-size:20px;margin-bottom:6px}
.adv-title{font-size:13px;font-weight:700;margin-bottom:5px;color:var(--accent)}
.adv-text{font-size:12px;color:var(--text2);line-height:1.65}

/* WEEK SCHED */
.w-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.w-day{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 3px;text-align:center}
.w-day.today{border-color:var(--accent);background:rgba(232,255,71,0.07)}
.w-day-name{font-size:10px;font-weight:700;color:var(--text2)}
.w-day.today .w-day-name{color:var(--accent)}
.w-day-part{font-size:8px;color:var(--text3);margin-top:3px;line-height:1.3}

/* GOAL */
.g-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:9px}
.g-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.g-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.g-cur{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.g-tgt{font-size:12px;color:var(--text3)}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width 0.5s ease}

/* CHART */
.chart-wrap{position:relative;height:180px;margin-bottom:14px}

/* CHAT PAGE */
.chat-messages{padding:14px 14px 0;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;border-radius:var(--r);padding:10px 13px;font-size:13px;line-height:1.6}
.msg-user{background:var(--accent);color:#0a0a0a;align-self:flex-end;font-weight:500;border-bottom-right-radius:4px}
.msg-ai{background:var(--bg2);color:var(--text);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-sys{background:transparent;color:var(--text3);font-size:11px;align-self:center;border:1px solid var(--border);padding:5px 10px}
.msg-action{background:var(--bg3);color:var(--text2);font-size:11px;align-self:flex-start;border:1px solid var(--border2);padding:7px 11px}
.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}

.chat-input-wrap{position:fixed;bottom:max(56px,calc(56px + env(safe-area-inset-bottom)));left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:none;z-index:99}
.chat-input-wrap.active{display:block}
.chat-row{display:flex;gap:8px}
.chat-row input{flex:1;border-radius:20px;padding:9px 14px}
.chat-send{background:var(--accent);color:#0a0a0a;border:none;border-radius:20px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}
.chat-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:8px}
.chat-chips::-webkit-scrollbar{display:none}
.chip{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.chip:active{background:var(--bg4)}

/* TOAST */
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--accent);color:#0a0a0a;padding:9px 18px;border-radius:100px;font-size:12px;font-weight:700;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.divider{height:1px;background:var(--border);margin:0 18px 18px}
.empty{text-align:center;padding:36px 18px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:7px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.rm-val{font-size:11px;color:var(--purple);background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.2);padding:2px 7px;border-radius:4px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== HOME ===== -->
<div class="page active" id="page-home">
  <div class="hdr">
    <div class="hdr-date" id="today-date"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end">
      <div class="hdr-title">今日</div>
      <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">STREAK</div><div style="font-size:18px;font-weight:700;color:var(--accent)" id="streak-disp">0日</div></div>
    </div>
  </div>
  <div class="sec">
    <div class="cal-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" style="flex-shrink:0">
        <circle cx="36" cy="36" r="30" fill="none" stroke="#1e1e1e" stroke-width="7"/>
        <circle cx="36" cy="36" r="30" fill="none" stroke="#e8ff47" stroke-width="7"
          stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke-linecap="round"
          transform="rotate(-90 36 36)" id="cal-ring" style="transition:stroke-dashoffset 0.5s ease"/>
      </svg>
      <div class="cal-info">
        <div class="cal-num"><span id="home-cal">0</span><span style="font-size:14px;font-weight:400;color:var(--text2)"> kcal</span></div>
        <div class="cal-lbl">本日の摂取</div>
        <div class="cal-rem" id="home-remain">—</div>
      </div>
    </div>
    <div class="m-grid">
      <div class="m-card"><div class="m-label">タンパク質</div><div class="m-val"><span id="h-p">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-pg">150</span>g</div><div class="m-bar"><div class="m-fill" id="bar-p" style="width:0%;background:var(--blue)"></div></div></div>
      <div class="m-card"><div class="m-label">脂質</div><div class="m-val"><span id="h-f">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-fg">60</span>g</div><div class="m-bar"><div class="m-fill" id="bar-f" style="width:0%;background:var(--orange)"></div></div></div>
      <div class="m-card"><div class="m-label">炭水化物</div><div class="m-val"><span id="h-c">0</span><span class="m-unit">g</span></div><div class="m-goal">/ <span id="h-cg">250</span>g</div><div class="m-bar"><div class="m-fill" id="bar-c" style="width:0%;background:var(--green)"></div></div></div>
      <div class="m-card"><div class="m-label">水分</div><div class="m-val"><span id="h-w">0</span><span class="m-unit">ml</span></div><div class="m-goal">/ 2500ml</div><div class="m-bar"><div class="m-fill" id="bar-w" style="width:0%;background:var(--accent)"></div></div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="sec">
    <div class="sec-label">今日のトレーニング</div>
    <div id="home-workout-sum"></div>
  </div>
  <div class="divider"></div>
  <div class="sec">
    <div class="sec-label">部位別 回復状況</div>
    <div id="rest-status"></div>
  </div>
  <div class="divider"></div>
  <div class="sec">
    <div class="sec-label">水分を追加</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-g btn-sm" onclick="addWater(200)">+200ml</button>
      <button class="btn btn-g btn-sm" onclick="addWater(350)">+350ml</button>
      <button class="btn btn-g btn-sm" onclick="addWater(500)">+500ml</button>
    </div>
  </div>
</div>

<!-- ===== FOOD ===== -->
<div class="page" id="page-food">
  <div class="hdr"><div class="hdr-date" id="food-date"></div><div class="hdr-title">食事記録</div></div>
  <div class="sec">
    <div class="tabs">
      <button class="tab active" onclick="foodTab('add')" id="ftab-add">追加</button>
      <button class="tab" onclick="foodTab('log')" id="ftab-log">今日の記録</button>
    </div>
    <div id="fpanel-add">
      <div class="af">
        <h3>手動入力</h3>
        <label class="f-label">食品名</label>
        <div class="f-full"><input type="text" id="fn" placeholder="例: 鶏むね肉 100g"></div>
        <div class="f-grid" style="margin-top:8px">
          <div><label class="f-label">カロリー (kcal)</label><input type="number" id="fc" placeholder="0"></div>
          <div><label class="f-label">タンパク質 (g)</label><input type="number" id="fp" placeholder="0"></div>
          <div><label class="f-label">脂質 (g)</label><input type="number" id="ff" placeholder="0"></div>
          <div><label class="f-label">炭水化物 (g)</label><input type="number" id="fcc" placeholder="0"></div>
        </div>
        <div style="margin-top:12px"><button class="btn btn-p" onclick="addFood()">追加する</button></div>
      </div>
      <div class="sec-label">クイック追加</div>
      <div id="quick-list"></div>
    </div>
    <div id="fpanel-log" style="display:none"><div id="food-log-list"></div></div>
  </div>
</div>

<!-- ===== WORKOUT ===== -->
<div class="page" id="page-workout">
  <div class="hdr"><div class="hdr-date" id="wo-date"></div><div class="hdr-title">筋トレ記録</div></div>
  <div class="sec">
    <div class="tabs">
      <button class="tab active" onclick="woTab('add')" id="wtab-add">追加</button>
      <button class="tab" onclick="woTab('log')" id="wtab-log">今日の記録</button>
      <button class="tab" onclick="woTab('hist')" id="wtab-hist">履歴</button>
    </div>
    <div id="wpanel-add">
      <div class="af">
        <h3>種目を追加</h3>
        <label class="f-label">種目名</label>
        <input type="text" id="ex-name" placeholder="例: ベンチプレス">
        <label class="f-label">部位</label>
        <select id="ex-part">
          <option value="胸">胸</option><option value="背中">背中</option>
          <option value="肩">肩</option><option value="腕">腕</option>
          <option value="脚">脚</option><option value="体幹">体幹</option>
        </select>
        <label class="f-label">セット (kg / 回)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" id="set-w" placeholder="kg" style="flex:1">
          <input type="number" id="set-r" placeholder="回" style="flex:1">
          <button class="btn btn-g btn-sm" onclick="addSet()" style="flex-shrink:0">+セット</button>
        </div>
        <div id="sets-list" style="margin-top:8px"></div>
        <label class="f-label">メモ (任意)</label>
        <input type="text" id="ex-comment" placeholder="フォーム・感覚など">
        <div style="margin-top:12px"><button class="btn btn-p" onclick="addExercise()">記録する</button></div>
      </div>
      <div class="sec-label">よく使う種目</div>
      <div class="tag-row">
        <button class="chip" onclick="quickEx('ベンチプレス','胸')">ベンチプレス</button>
        <button class="chip" onclick="quickEx('インクラインDB','胸')">インクラインDB</button>
        <button class="chip" onclick="quickEx('スクワット','脚')">スクワット</button>
        <button class="chip" onclick="quickEx('デッドリフト','背中')">デッドリフト</button>
        <button class="chip" onclick="quickEx('ラットプルダウン','背中')">ラットプルダウン</button>
        <button class="chip" onclick="quickEx('ショルダープレス','肩')">ショルダープレス</button>
        <button class="chip" onclick="quickEx('サイドレイズ','肩')">サイドレイズ</button>
        <button class="chip" onclick="quickEx('ダンベルカール','腕')">DBカール</button>
        <button class="chip" onclick="quickEx('プランク','体幹')">プランク</button>
      </div>
    </div>
    <div id="wpanel-log" style="display:none"><div id="wo-log-list"></div></div>
    <div id="wpanel-hist" style="display:none">
      <div class="sec-label" style="margin-bottom:8px">種目を選択</div>
      <select id="hist-ex-sel" onchange="renderHistChart()" style="margin-bottom:14px">
        <option value="">-- 種目を選択 --</option>
      </select>
      <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
      <div id="hist-detail"></div>
    </div>
  </div>
</div>

<!-- ===== CHAT (AI) ===== -->
<div class="page" id="page-chat">
  <div class="hdr"><div class="hdr-title">AI トレーナー</div><div style="font-size:11px;color:var(--text3);margin-top:3px">話しかけるだけで記録・アドバイス</div></div>
  <div id="chat-messages" class="chat-messages"></div>
  <div style="height:130px"></div>
</div>
<div class="chat-input-wrap" id="chat-input-area">
  <div class="chat-chips" id="chat-chips"></div>
  <div class="chat-row">
    <input type="text" id="chat-in" placeholder="例: ベンチ80kg×5回を3セットやった" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">送信</button>
  </div>
</div>

<!-- ===== GOALS ===== -->
<div class="page" id="page-goals">
  <div class="hdr"><div class="hdr-title">目標 & 進捗</div></div>
  <div class="sec">
    <div class="sec-label">体組成</div>
    <div class="g-item">
      <div class="g-lbl">体重</div>
      <div class="g-row"><div class="g-cur"><span id="g-w">70.5</span><span style="font-size:13px;color:var(--text3)">kg</span></div><div class="g-tgt">目標 <span id="gt-w">67</span>kg</div></div>
      <div class="prog-bar"><div class="prog-fill" id="pg-w" style="background:var(--accent)"></div></div>
    </div>
    <div class="g-item">
      <div class="g-lbl">体脂肪率</div>
      <div class="g-row"><div class="g-cur"><span id="g-fat">16.5</span><span style="font-size:13px;color:var(--text3)">%</span></div><div class="g-tgt">目標 <span id="gt-fat">12</span>%</div></div>
      <div class="prog-bar"><div class="prog-fill" id="pg-fat" style="background:var(--red)"></div></div>
    </div>
    <div class="g-item">
      <div class="g-lbl">ベンチプレス 推定1RM</div>
      <div class="g-row"><div class="g-cur"><span id="g-bench">—</span><span style="font-size:13px;color:var(--text3)">kg</span></div><div class="g-tgt">目標 <span id="gt-bench">80</span>kg</div></div>
      <div class="prog-bar"><div class="prog-fill" id="pg-bench" style="background:var(--blue)"></div></div>
    </div>

    <div class="sec-label" style="margin-top:18px">週次トレンド</div>
    <div class="chart-wrap"><canvas id="weight-chart"></canvas></div>

    <div class="sec-label" style="margin-top:4px">栄養目標 (1日)</div>
    <div class="af" style="border-color:var(--border)">
      <div class="f-grid">
        <div><label class="f-label">カロリー目標</label><input type="number" id="gcal" value="2200"></div>
        <div><label class="f-label">タンパク質 (g)</label><input type="number" id="gp" value="150"></div>
        <div><label class="f-label">脂質 (g)</label><input type="number" id="gf" value="60"></div>
        <div><label class="f-label">炭水化物 (g)</label><input type="number" id="gc" value="250"></div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-p" onclick="saveGoals()">保存</button></div>
    </div>

    <div class="sec-label">体組成を更新</div>
    <div class="af" style="border-color:var(--border)">
      <div class="f-grid">
        <div><label class="f-label">体重 (kg)</label><input type="number" id="upd-w" step="0.1" placeholder="70.5"></div>
        <div><label class="f-label">体脂肪率 (%)</label><input type="number" id="upd-fat" step="0.1" placeholder="16.5"></div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-p" onclick="saveBody()">更新</button></div>
    </div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb active" onclick="showPage('home',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ホーム
  </button>
  <button class="nb" onclick="showPage('food',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    食事
  </button>
  <button class="nb" onclick="showPage('workout',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6.5 6.5h11M6.5 17.5h11M3 10h18M3 14h18"/></svg>
    筋トレ
  </button>
  <button class="nb" onclick="showPage('chat',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    AI
  </button>
  <button class="nb" onclick="showPage('goals',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    目標
  </button>
</nav>

<script>
// ========== STATE ==========
const TODAY = new Date().toISOString().split('T')[0];

let S = JSON.parse(localStorage.getItem('tr-v2') || 'null') || {
  goals:{ cal:2200, p:150, f:60, c:250 },
  body:{ weight:70.5, fat:16.5 },
  bodyTargets:{ weight:67, fat:12, bench:80 },
  bodyHistory:[],
  foods:{}, water:{}, workouts:{},
  streak:0, lastActive:null
};

function save(){ localStorage.setItem('tr-v2', JSON.stringify(S)); }

// Migrate old data
const oldData = localStorage.getItem('training-state');
if (oldData && !localStorage.getItem('tr-v2-migrated')) {
  try {
    const old = JSON.parse(oldData);
    if (old.foods) Object.assign(S.foods, old.foods);
    if (old.workouts) Object.assign(S.workouts, old.workouts);
    if (old.water) Object.assign(S.water, old.water);
    if (old.body) S.body = old.body;
    if (old.goals) S.goals = old.goals;
    localStorage.setItem('tr-v2-migrated','1');
    save();
  } catch(e){}
}

// Streak
if (S.lastActive !== TODAY) {
  const yest = new Date(Date.now()-86400000).toISOString().split('T')[0];
  S.streak = S.lastActive === yest ? S.streak+1 : 1;
  S.lastActive = TODAY;
  save();
}

// ========== UTILS ==========
const DAYS = ['日','月','火','水','木','金','土'];
function fmtDate(d){ return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`; }
function epley(w,r){ return r===1 ? w : Math.round(w*(1+r/30)); }
function getDateStr(offset){ return new Date(Date.now()+offset*86400000).toISOString().split('T')[0]; }

document.querySelectorAll('#today-date,#food-date,#wo-date').forEach(el=>{ if(el) el.textContent=fmtDate(new Date()); });

const QUICK_FOODS = [
  {name:'鶏むね肉 100g',cal:108,p:22.3,f:1.5,c:0},
  {name:'卵 1個',cal:76,p:6.2,f:5.1,c:0.3},
  {name:'白米 150g',cal:234,p:3.8,f:0.5,c:53.4},
  {name:'プロテイン 1杯',cal:120,p:25,f:2,c:5},
  {name:'バナナ 1本',cal:86,p:1.1,f:0.2,c:22.5},
  {name:'サバ缶 1缶',cal:190,p:20,f:12,c:0.5},
  {name:'ブロッコリー 100g',cal:33,p:3.5,f:0.4,c:5.2},
  {name:'オートミール 50g',cal:177,p:6,f:3.5,c:31},
  {name:'ギリシャヨーグルト',cal:59,p:10,f:0.4,c:3.6},
  {name:'アーモンド 30g',cal:173,p:6,f:15,c:4}
];

const PARTS = ['胸','背中','肩','腕','脚','体幹'];
const REST_HOURS = { 胸:48, 背中:48, 肩:48, 腕:36, 脚:72, 体幹:24 };

// ========== NAVIGATION ==========
let activeChart = null;
function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  document.getElementById('chat-input-area').classList.toggle('active', id==='chat');
  if(id==='home') renderHome();
  if(id==='food'){ renderQuickFoods(); renderFoodLog(); }
  if(id==='workout'){ renderWoLog(); renderHistSel(); }
  if(id==='chat') initChat();
  if(id==='goals') renderGoals();
}

// ========== HOME ==========
function renderHome(){
  const foods = S.foods[TODAY]||[];
  const water = S.water[TODAY]||0;
  const cal=foods.reduce((a,f)=>a+f.cal,0);
  const p=foods.reduce((a,f)=>a+f.p,0);
  const f=foods.reduce((a,f)=>a+f.f,0);
  const c=foods.reduce((a,f)=>a+f.c,0);

  document.getElementById('home-cal').textContent=Math.round(cal);
  document.getElementById('h-p').textContent=Math.round(p);
  document.getElementById('h-f').textContent=Math.round(f);
  document.getElementById('h-c').textContent=Math.round(c);
  document.getElementById('h-w').textContent=water;
  document.getElementById('h-pg').textContent=S.goals.p;
  document.getElementById('h-fg').textContent=S.goals.f;
  document.getElementById('h-cg').textContent=S.goals.c;
  document.getElementById('streak-disp').textContent=S.streak+'日';

  const rem=S.goals.cal-cal;
  document.getElementById('home-remain').textContent = rem>=0
    ? `残り ${Math.round(rem)} kcal (目標 ${S.goals.cal})` : `${Math.round(-rem)} kcal オーバー`;

  const pct=Math.min(cal/S.goals.cal,1);
  document.getElementById('cal-ring').style.strokeDashoffset=188.5*(1-pct);

  [['bar-p',p,S.goals.p],['bar-f',f,S.goals.f],['bar-c',c,S.goals.c],['bar-w',water,2500]].forEach(([id,v,g])=>{
    document.getElementById(id).style.width=Math.min(v/g*100,100)+'%';
  });

  // Workout summary
  const ws=S.workouts[TODAY]||[];
  const wsEl=document.getElementById('home-workout-sum');
  wsEl.innerHTML = ws.length===0
    ? '<div class="empty"><div class="empty-icon">💪</div>まだ記録なし — AIに話しかけよう</div>'
    : ws.map(w=>{
        const rm=w.sets.length>0?epley(w.sets[0].w,w.sets[0].r):null;
        return `<div class="li"><div><div class="li-name">${w.name}</div><div class="li-sub">${w.part} · ${w.sets.length}セット${rm?` · 推定1RM ${rm}kg`:''}</div></div><div class="li-right"><span class="badge badge-p">${w.sets[0]?w.sets[0].w+'kg':'—'}</span></div></div>`;
      }).join('');

  // Rest status
  const rsEl=document.getElementById('rest-status');
  const now=Date.now();
  rsEl.innerHTML=PARTS.map(part=>{
    let lastMs=0;
    for(let d=0;d<=14;d++){
      const dt=getDateStr(-d);
      const wo=S.workouts[dt]||[];
      if(wo.some(w=>w.part===part)){
        lastMs=new Date(dt).getTime()+(d===0?now-new Date(TODAY).getTime():86400000);
        break;
      }
    }
    const needed=REST_HOURS[part]*3600000;
    const elapsed=lastMs?now-lastMs+86400000:Infinity;
    const ready=elapsed>=needed;
    const hLeft=lastMs?Math.max(0,Math.round((needed-elapsed)/3600000)):0;
    const col=ready?'var(--green)':'var(--red)';
    return `<div class="li" style="margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:9px">
        <div class="rest-dot" style="background:${col}"></div>
        <div><div class="li-name">${part}</div><div class="li-sub">${ready?'回復完了 ✓':hLeft+'h 後に回復'}</div></div>
      </div>
      <div style="font-size:10px;color:var(--text3)">推奨${REST_HOURS[part]}h</div>
    </div>`;
  }).join('');
}

function addWater(ml){ S.water[TODAY]=(S.water[TODAY]||0)+ml; save(); renderHome(); showToast('+'+ml+'ml'); }

// ========== FOOD ==========
function foodTab(t){
  document.getElementById('fpanel-add').style.display=t==='add'?'':'none';
  document.getElementById('fpanel-log').style.display=t==='log'?'':'none';
  document.getElementById('ftab-add').classList.toggle('active',t==='add');
  document.getElementById('ftab-log').classList.toggle('active',t==='log');
  if(t==='log') renderFoodLog();
}
function renderQuickFoods(){
  document.getElementById('quick-list').innerHTML=QUICK_FOODS.map((f,i)=>
    `<div class="li" onclick="quickAdd(${i})" style="cursor:pointer">
      <div><div class="li-name">${f.name}</div><div class="li-sub">P${f.p}g F${f.f}g C${f.c}g</div></div>
      <div class="li-val">${f.cal}</div>
    </div>`).join('');
}
function quickAdd(i){ const f=QUICK_FOODS[i]; if(!S.foods[TODAY])S.foods[TODAY]=[]; S.foods[TODAY].push({...f}); save(); renderHome(); showToast(f.name+' を追加'); }
function addFood(){
  const name=document.getElementById('fn').value.trim();
  if(!name){showToast('食品名を入力');return;}
  const item={name,cal:+document.getElementById('fc').value||0,p:+document.getElementById('fp').value||0,f:+document.getElementById('ff').value||0,c:+document.getElementById('fcc').value||0};
  if(!S.foods[TODAY])S.foods[TODAY]=[];
  S.foods[TODAY].push(item);
  save();
  ['fn','fc','fp','ff','fcc'].forEach(id=>document.getElementById(id).value='');
  renderHome(); showToast(name+' を追加');
}
function renderFoodLog(){
  const foods=S.foods[TODAY]||[];
  const el=document.getElementById('food-log-list');
  el.innerHTML=foods.length===0?'<div class="empty"><div class="empty-icon">🍱</div>まだ記録がありません</div>'
    :foods.map((f,i)=>`<div class="li"><div><div class="li-name">${f.name}</div><div class="li-sub">P${f.p}g F${f.f}g C${f.c}g</div></div><div class="li-right"><div class="li-val">${f.cal}</div><button class="del-btn" onclick="delFood(${i})">×</button></div></div>`).join('');
}
function delFood(i){ S.foods[TODAY].splice(i,1); save(); renderFoodLog(); renderHome(); }

// ========== WORKOUT ==========
let curSets=[];
function woTab(t){
  ['add','log','hist'].forEach(x=>{
    document.getElementById('wpanel-'+x).style.display=t===x?'':'none';
    document.getElementById('wtab-'+x).classList.toggle('active',t===x);
  });
  if(t==='log') renderWoLog();
  if(t==='hist'){ renderHistSel(); renderHistChart(); }
}
function quickEx(name,part){ document.getElementById('ex-name').value=name; document.getElementById('ex-part').value=part; document.getElementById('set-w').focus(); }
function addSet(){
  const w=+document.getElementById('set-w').value;
  const r=+document.getElementById('set-r').value;
  if(!w||!r){showToast('重量と回数を入力');return;}
  curSets.push({w,r});
  document.getElementById('set-w').value='';
  document.getElementById('set-r').value='';
  renderCurSets();
}
function renderCurSets(){
  document.getElementById('sets-list').innerHTML=curSets.map((s,i)=>{
    const rm=epley(s.w,s.r);
    return `<div class="set-row"><div class="set-lbl">Set ${i+1}</div><div class="set-vals">${s.w}kg × ${s.r}回 <span class="rm-val">1RM≈${rm}kg</span></div><button class="set-del" onclick="delSet(${i})">×</button></div>`;
  }).join('');
}
function delSet(i){ curSets.splice(i,1); renderCurSets(); }
function addExercise(){
  const name=document.getElementById('ex-name').value.trim();
  const part=document.getElementById('ex-part').value;
  const comment=document.getElementById('ex-comment').value.trim();
  if(!name){showToast('種目名を入力');return;}
  if(curSets.length===0){showToast('セットを追加してください');return;}
  if(!S.workouts[TODAY])S.workouts[TODAY]=[];
  S.workouts[TODAY].push({name,part,sets:[...curSets],comment,ts:Date.now()});
  curSets=[];
  save();
  document.getElementById('ex-name').value='';
  document.getElementById('ex-comment').value='';
  renderCurSets(); renderHome(); showToast(name+' を記録');
}
function renderWoLog(){
  const ws=S.workouts[TODAY]||[];
  const el=document.getElementById('wo-log-list');
  el.innerHTML=ws.length===0?'<div class="empty"><div class="empty-icon">🏋️</div>まだ記録がありません</div>'
    :ws.map((w,i)=>{
      const best=w.sets.reduce((a,s)=>epley(s.w,s.r)>a?epley(s.w,s.r):a,0);
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-weight:700;font-size:14px">${w.name}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge badge-p">${w.part}</span>
            <button class="del-btn" onclick="delWo(${i})">×</button>
          </div>
        </div>
        ${w.sets.map((s,j)=>`<div class="set-row"><div class="set-lbl">Set ${j+1}</div><div class="set-vals">${s.w}kg × ${s.r}回 <span class="rm-val">≈${epley(s.w,s.r)}kg</span></div></div>`).join('')}
        <div style="margin-top:8px;font-size:11px;color:var(--purple)">推定1RM: ${best}kg</div>
        ${w.comment?`<div style="font-size:11px;color:var(--text3);margin-top:5px;font-style:italic">💬 ${w.comment}</div>`:''}
      </div>`;
    }).join('');
}
function delWo(i){ S.workouts[TODAY].splice(i,1); save(); renderWoLog(); renderHome(); }

// ========== HISTORY CHART ==========
let histChartInst=null;
function renderHistSel(){
  const exNames=new Set();
  Object.values(S.workouts).forEach(ws=>ws.forEach(w=>exNames.add(w.name)));
  const sel=document.getElementById('hist-ex-sel');
  const cur=sel.value;
  sel.innerHTML='<option value="">-- 種目を選択 --</option>'+[...exNames].map(n=>`<option value="${n}" ${n===cur?'selected':''}>${n}</option>`).join('');
}
function renderHistChart(){
  const ex=document.getElementById('hist-ex-sel').value;
  const detEl=document.getElementById('hist-detail');
  if(!ex){detEl.innerHTML='';return;}

  const data=[];
  for(let i=29;i>=0;i--){
    const d=getDateStr(-i);
    const ws=(S.workouts[d]||[]).filter(w=>w.name===ex);
    if(ws.length>0){
      const bestRM=Math.max(...ws.flatMap(w=>w.sets.map(s=>epley(s.w,s.r))));
      const bestW=Math.max(...ws.flatMap(w=>w.sets.map(s=>s.w)));
      const vol=ws.reduce((a,w)=>a+w.sets.reduce((b,s)=>b+s.w*s.r,0),0);
      data.push({date:d,rm:bestRM,weight:bestW,vol:Math.round(vol)});
    }
  }

  const ctx=document.getElementById('hist-chart').getContext('2d');
  if(histChartInst) histChartInst.destroy();
  histChartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:data.map(d=>d.date.slice(5)),
      datasets:[{
        label:'推定1RM (kg)',
        data:data.map(d=>d.rm),
        borderColor:'#e8ff47',
        backgroundColor:'rgba(232,255,71,0.08)',
        borderWidth:2,
        pointRadius:4,
        pointBackgroundColor:'#e8ff47',
        tension:0.3,
        fill:true
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`1RM: ${c.parsed.y}kg`}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#4a4a4a',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#4a4a4a',font:{size:10}}}
      }
    }
  });

  detEl.innerHTML=data.length===0?'<div class="empty">データなし</div>'
    :`<div class="sec-label">最近のセッション</div>`+data.slice(-5).reverse().map(d=>
      `<div class="li"><div class="li-name">${d.date}</div><div class="li-sub">最大重量 ${d.weight}kg / 総ボリューム ${d.vol}kg</div><span class="rm-val">1RM≈${d.rm}kg</span></div>`
    ).join('');
}

// ========== GOALS & CHARTS ==========
let weightChartInst=null;
function renderGoals(){
  document.getElementById('g-w').textContent=S.body.weight;
  document.getElementById('g-fat').textContent=S.body.fat;
  document.getElementById('gt-w').textContent=S.bodyTargets.weight;
  document.getElementById('gt-fat').textContent=S.bodyTargets.fat;
  document.getElementById('gt-bench').textContent=S.bodyTargets.bench;

  // best bench 1RM across all time
  let bestBench=0;
  Object.values(S.workouts).forEach(ws=>{
    ws.filter(w=>w.name.includes('ベンチ')).forEach(w=>{
      w.sets.forEach(s=>{ const rm=epley(s.w,s.r); if(rm>bestBench) bestBench=rm; });
    });
  });
  document.getElementById('g-bench').textContent=bestBench||'—';

  const wPct=Math.max(0,Math.min(100,(1-(S.body.weight-S.bodyTargets.weight)/(75-S.bodyTargets.weight))*100));
  const fPct=Math.max(0,Math.min(100,(1-(S.body.fat-S.bodyTargets.fat)/(20-S.bodyTargets.fat))*100));
  const bPct=bestBench?Math.max(0,Math.min(100,bestBench/S.bodyTargets.bench*100)):0;
  document.getElementById('pg-w').style.width=Math.round(wPct)+'%';
  document.getElementById('pg-fat').style.width=Math.round(fPct)+'%';
  document.getElementById('pg-bench').style.width=Math.round(bPct)+'%';

  document.getElementById('gcal').value=S.goals.cal;
  document.getElementById('gp').value=S.goals.p;
  document.getElementById('gf').value=S.goals.f;
  document.getElementById('gc').value=S.goals.c;

  // Weight history chart
  const hist=S.bodyHistory.slice(-14);
  const ctx=document.getElementById('weight-chart').getContext('2d');
  if(weightChartInst) weightChartInst.destroy();
  weightChartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:hist.map(h=>h.date.slice(5)),
      datasets:[
        {label:'体重(kg)',data:hist.map(h=>h.weight),borderColor:'#e8ff47',backgroundColor:'rgba(232,255,71,0.07)',borderWidth:2,pointRadius:3,tension:0.3,fill:true},
        {label:'体脂肪%',data:hist.map(h=>h.fat),borderColor:'#ff5c5c',backgroundColor:'rgba(255,92,92,0.05)',borderWidth:1.5,pointRadius:2,tension:0.3,fill:true,yAxisID:'y2'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#888',font:{size:10},boxWidth:12}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#4a4a4a',font:{size:10}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#4a4a4a',font:{size:10}}},
        y2:{position:'right',grid:{display:false},ticks:{color:'#4a4a4a',font:{size:10}}}
      }
    }
  });
}
function saveGoals(){
  S.goals={cal:+document.getElementById('gcal').value||2200,p:+document.getElementById('gp').value||150,f:+document.getElementById('gf').value||60,c:+document.getElementById('gc').value||250};
  save(); renderHome(); showToast('目標を保存');
}
function saveBody(){
  const w=+document.getElementById('upd-w').value;
  const fat=+document.getElementById('upd-fat').value;
  if(w) S.body.weight=w;
  if(fat) S.body.fat=fat;
  if(w||fat) S.bodyHistory.push({date:TODAY,weight:S.body.weight,fat:S.body.fat});
  save(); renderGoals(); showToast('体組成を更新');
}

// ========== CHAT ==========
let chatHistory=[];
let chatInited=false;
function initChat(){
  if(chatInited) return;
  chatInited=true;
  addSysMsg('こんにちは！トレーニング・食事・アドバイス、なんでも話しかけてください。記録も自動でします。');
  renderChips();
}
const CHIPS=['今日のサマリーを教えて','胸をトレしたい','今日の食事を記録したい','休息日にすべきか相談'];
function renderChips(){
  document.getElementById('chat-chips').innerHTML=CHIPS.map(c=>`<button class="chip" onclick="sendChatText('${c}')">${c}</button>`).join('');
}

function buildContext(){
  const foods=S.foods[TODAY]||[];
  const ws=S.workouts[TODAY]||[];
  const cal=foods.reduce((a,f)=>a+f.cal,0);
  const p=foods.reduce((a,f)=>a+f.p,0);

  const recentWo=[];
  for(let i=1;i<=7;i++){
    const d=getDateStr(-i);
    (S.workouts[d]||[]).forEach(w=>recentWo.push({daysAgo:i,...w}));
  }

  const restStatus=PARTS.map(part=>{
    let daysAgo=null;
    for(let d=0;d<=7;d++){
      if((S.workouts[getDateStr(-d)]||[]).some(w=>w.part===part)){daysAgo=d;break;}
    }
    const needed=REST_HOURS[part];
    const elapsed=daysAgo!==null?daysAgo*24:999;
    return `${part}: ${elapsed>=needed?'回復済み':'未回復('+Math.round(needed-elapsed)+'h必要)'}`;
  }).join(', ');

  return `【ユーザープロフィール】青学国際経済1年、アメフトDB(CB/S)。体重${S.body.weight}kg 体脂肪${S.body.fat}%。目標: 体重${S.bodyTargets.weight}kg 体脂肪${S.bodyTargets.fat}%。
【栄養目標】カロリー${S.goals.cal}kcal タンパク質${S.goals.p}g
【今日の摂取】${Math.round(cal)}kcal タンパク質${Math.round(p)}g
【今日のトレーニング】${ws.length>0?ws.map(w=>`${w.name}(${w.part})${w.sets.map(s=>` ${s.w}kg×${s.r}`).join('')}`).join('; '):'なし'}
【部位別回復状況】${restStatus}
【過去7日の主なトレーニング】${recentWo.length>0?recentWo.map(w=>`${w.daysAgo}日前: ${w.name}(${w.part})`).join(', '):'なし'}`;
}

function addSysMsg(text){ addMsgEl('<div class="msg msg-sys">'+text+'</div>'); }
function addUserMsg(text){ addMsgEl('<div class="msg msg-user">'+escHtml(text)+'</div>'); }
function addAiMsg(text){ addMsgEl('<div class="msg msg-ai">'+text.replace(/\n/g,'<br>')+'</div>'); }
function addActionMsg(text){ addMsgEl('<div class="msg msg-action">✅ '+escHtml(text)+'</div>'); }
function addMsgEl(html){
  const el=document.createElement('div');
  el.innerHTML=html;
  document.getElementById('chat-messages').appendChild(el.firstChild);
  scrollChat();
}
function scrollChat(){ setTimeout(()=>{ const el=document.getElementById('chat-messages'); el.scrollTop=el.scrollHeight; window.scrollTo(0,document.body.scrollHeight); },50); }
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sendChatText(t){ document.getElementById('chat-in').value=t; sendChat(); }

async function sendChat(){
  const input=document.getElementById('chat-in');
  const text=input.value.trim();
  if(!text) return;
  input.value='';

  addUserMsg(text);
  chatHistory.push({role:'user',content:text});

  // Typing indicator
  const typingId='typing-'+Date.now();
  const typingEl=document.createElement('div');
  typingEl.id=typingId;
  typingEl.className='msg msg-ai';
  typingEl.innerHTML='<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  document.getElementById('chat-messages').appendChild(typingEl);
  scrollChat();

  const ctx=buildContext();

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`あなたはパーソナルトレーナー兼栄養士のAIアシスタント「TRAINING」です。
ユーザーの現在のデータ:
${ctx}

【あなたの役割】
1. トレーニングや食事の記録を自然言語から解析する
2. 部位別の回復状況を考慮してアドバイスする
3. 種目の記録意図を検出したら必ず record_workout または record_food の操作をJSON形式で返す
4. 今日すでに鍛えた部位、または回復が不十分な部位のトレーニングは止める

【記録時のフォーマット】
種目記録を検出したら、返答の末尾に以下のJSONを含める（コードブロックなし）:
ACTION:{"type":"workout","name":"種目名","part":"部位","sets":[{"w":重量数値,"r":回数数値}],"comment":"コメント"}

食事記録を検出したら:
ACTION:{"type":"food","name":"食品名","cal":数値,"p":数値,"f":数値,"c":数値}

記録不要な場合はACTIONを含めない。

【返答スタイル】
・短く・具体的・実用的（150字以内が基本）
・部位の回復チェックを必ず行う
・アメフトDB（CB/S）としての機能向上（アジリティ・瞬発力・体組成）を意識したアドバイス
・敬語不要、フレンドリーに`,
        messages:chatHistory.slice(-10)
      })
    });
    const data=await res.json();
    const raw=data.content?.[0]?.text||'エラーが発生しました。';

    // Remove typing
    const tyEl=document.getElementById(typingId);
    if(tyEl) tyEl.remove();

    // Parse ACTION
    const actionMatch=raw.match(/ACTION:(\{.+\})/);
    let displayText=raw.replace(/ACTION:\{.+\}/,'').trim();
    addAiMsg(displayText);
    chatHistory.push({role:'assistant',content:raw});

    if(actionMatch){
      try{
        const action=JSON.parse(actionMatch[1]);
        if(action.type==='workout'){
          if(!S.workouts[TODAY])S.workouts[TODAY]=[];
          S.workouts[TODAY].push({name:action.name,part:action.part,sets:action.sets,comment:action.comment||'',ts:Date.now()});
          save(); renderHome();
          addActionMsg(`「${action.name}」を記録しました (${action.sets.map(s=>s.w+'kg×'+s.r).join(', ')})`);
        } else if(action.type==='food'){
          if(!S.foods[TODAY])S.foods[TODAY]=[];
          S.foods[TODAY].push({name:action.name,cal:action.cal||0,p:action.p||0,f:action.f||0,c:action.c||0});
          save(); renderHome();
          addActionMsg(`「${action.name}」を記録しました (${action.cal}kcal)`);
        }
      }catch(e){}
    }
  } catch(e){
    const tyEl=document.getElementById(typingId);
    if(tyEl) tyEl.remove();
    addAiMsg('接続エラーが発生しました。再度試してください。');
  }
}

// ========== TOAST ==========
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ========== INIT ==========
renderHome();
renderQuickFoods();
</script>
